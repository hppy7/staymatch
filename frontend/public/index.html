<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayMatch | Find Your Human</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="main-container">

<div class="visual-side">

<div class="logo">Stay<span>Match</span></div>

<div class="floating-cards">
<div class="card c1">🏠 <span>Near Downtown</span></div>
<div class="card c2">🐱 <span>Pet Friendly</span></div>
<div class="card c3">☕ <span>Early Bird</span></div>
</div>

<h1>Your next best friend is just a <span>match</span> away.</h1>

</div>


<div class="form-side">

<div class="form-wrapper">

<div class="tab-group">
<button id="login-tab" class="tab-btn active">Login</button>
<button id="signup-tab" class="tab-btn">Sign Up</button>
</div>


<form id="login-form" class="auth-form active">

<h2>Welcome Back</h2>

<div class="input-group">
<input type="email" id="login-email" required>
<label>Email Address</label>
</div>

<div class="input-group">
<input type="password" id="login-pass" required>
<label>Password</label>
</div>

<button type="submit" class="btn-primary">Enter StayMatch</button>

</form>


<form id="signup-form" class="auth-form" style="display:none">

<h2>Create Account</h2>

<div class="input-group">
<input type="text" id="reg-name" required>
<label>Full Name</label>
</div>

<div class="input-group">
<input type="email" id="reg-email" required>
<label>Email Address</label>
</div>

<div class="input-group">
<input type="password" id="reg-pass" required>
<label>Create Password</label>
</div>

<button type="submit" class="btn-primary">Start Matching</button>

</form>

</div>
</div>
</div>

<script src="../src/components/script.js"></script>

</body>
</html>
